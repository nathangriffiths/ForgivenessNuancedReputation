# Tiny configuration for a quick smoke test of main.py.
#
# Runs single-threaded (REMOTE = False), with a small population and short
# sampling, so it should finish in a few minutes on a laptop without any
# Ray cluster setup. Tweak any of the scaling parameters (NUM_AGENTS,
# BURN_IN, *_SIM_*) to trade speed for fidelity.
#
# Example invocation:
#   python main.py -c sample_config.ini -e sample_heatmap.png -v

[DEFAULT]
REMOTE = False
ASSESSMENT_FORGIVENESS = True
ACTION_FORGIVENESS = False
AJD_FORGIVENESS = False
MAX_IMAGE = 3
MIN_IMAGE = 0
OBS_PROB = 0.8
FORGIVE_EXPONENTS = False
FORGIVE_VALUE = [0.05]
REPUTATION_NOISE = 0.0
ACTION_NOISE = 0.05
PERCEPTION_NOISE = 0.05
DONATE_UTILITY = -0.1
RECEIVE_UTILITY = 1
BETA = 1000
NUM_AGENTS = 5
BURN_IN = 100
MIN_SIM_ITERS = 200
MAX_SIM_ITERS = 500
NUM_SIM_RUNS = 20

[SYSTEM]
NUM_CPUS = 4
LOG_LEVEL = INFO
